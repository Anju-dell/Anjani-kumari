<!DOCTYPE html>
<html>
    <head>
        <title>Border</title>
        <style>
         div{
            border: solid 5px rgb(231, 24, 124);
            border-radius: 20px;
            padding-left: 300px;
            padding-bottom: 50px;
            padding-right: 100px;
            margin: 10px;
            margin-left: 200px;
            margin-top: 200px;
            margin-right: 200px;
            margin-bottom: 100px;
         }
         section{
            border-left: solid;
            border-right: double ;
            border-top: dotted;
            border-bottom: dashed;
         }
        </style>
    </head>
    <body>
        <h1>MENU</h1>
        <div>
            <img src="images/nonveg.png"  height="300px" width="400px">
            <section>
                <h2>Name: Meal</h2>
                <h3>Price 499</h3>
            </section>
             <img src="images/starters.png" height="300px" width="400px">
            <section>
                <h2>Name: starters</h2>   
                 <h3>Price 499</h3> 
            </section>
                 </div>
    </body>
</html>
